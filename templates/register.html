<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX - Register Student</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 32px;
            overflow: auto;
        }
        .camera-page {
            width: 100%;
            max-width: 720px;
            animation: fadeSlideIn 0.4s ease;
        }
        .camera-page .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            margin-bottom: 20px;
            transition: color 0.2s;
        }
        .camera-page .back-btn:hover { color: var(--text-primary); }
        .camera-page h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .camera-page .subtitle {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 24px;
        }
        .video-box {
            position: relative;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-glass);
            box-shadow: 0 16px 48px rgba(0,0,0,.4);
            background: #000;
            margin-bottom: 20px;
        }
        .video-box video { width: 100%; display: block; }
        .video-box canvas.overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
        }
        .capture-count {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .capture-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .08em;
        }
        .status-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--accent-green);
            min-height: 20px;
        }

        /* Confirm button styling */
        .confirm-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 16px 0;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
        }
        .confirm-bar.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .confirm-bar .btn-confirm {
            padding: 12px 32px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        .confirm-bar .btn-yes {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            box-shadow: 0 4px 16px rgba(34, 197, 94, 0.3);
        }
        .confirm-bar .btn-yes:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(34, 197, 94, 0.4);
        }
        .confirm-bar .btn-no {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .confirm-bar .btn-no:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.4);
        }
        .preview-hint {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            margin-top: -8px;
            margin-bottom: 12px;
            min-height: 18px;
        }
    </style>
</head>
<body>
    <div class="camera-page">
        <a href="/" class="back-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
            Back to Dashboard
        </a>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
            <h1 style="margin: 0;">Register New Student</h1>
            <select id="camera-select" class="form-control" style="padding: 8px 12px; font-size: 13px; max-width: 200px; background: #1a1a2e; color: #e0e0e0; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; cursor: pointer; appearance: auto;" onchange="switchCamera()">
                <option value="" style="background: #1a1a2e; color: #e0e0e0;">Loading cameras...</option>
            </select>
        </div>
        <p class="subtitle" id="subtitle-text">Position your face in front of the camera. The system will detect your face for confirmation.</p>

        <div class="video-box">
            <video id="webcam" autoplay playsinline></video>
            <canvas class="overlay" id="overlay"></canvas>
        </div>

        <p class="preview-hint" id="preview-hint"></p>

        <div class="confirm-bar" id="confirm-bar">
            <button class="btn-confirm btn-yes" id="btn-confirm-yes" onclick="confirmFace()">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align: -3px; margin-right: 6px;"><polyline points="20 6 9 17 4 12"/></svg>
                Yes, that's me
            </button>
            <button class="btn-confirm btn-no" onclick="window.location.href='/'">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: -2px; margin-right: 4px;"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                Cancel
            </button>
        </div>

        <div class="info-bar" id="info-bar" style="display: none;">
            <div>
                <div class="capture-count" id="count-display">0 / 20</div>
                <div class="capture-label">Frames Captured</div>
            </div>
            <div class="status-text" id="status-msg">Initializing camera...</div>
        </div>
    </div>

    <canvas id="send-canvas" style="display:none;"></canvas>

    <script>
        // Get student info from URL params
        const params = new URLSearchParams(window.location.search);
        const studentId = params.get('id');
        const studentName = params.get('name');

        if (!studentId || !studentName) {
            alert('Missing student ID or name. Redirecting back.');
            window.location.href = '/';
        }

        const video = document.getElementById('webcam');
        const overlay = document.getElementById('overlay');
        const overCtx = overlay.getContext('2d');
        const sendCanvas = document.getElementById('send-canvas');
        const sendCtx = sendCanvas.getContext('2d');
        const statusMsg = document.getElementById('status-msg');
        const countDisplay = document.getElementById('count-display');
        const confirmBar = document.getElementById('confirm-bar');
        const infoBar = document.getElementById('info-bar');
        const previewHint = document.getElementById('preview-hint');
        const subtitleText = document.getElementById('subtitle-text');

        let ws = null;
        let stream = null;
        let phase = 'preview'; // 'preview' or 'capture'

        const cameraSelect = document.getElementById('camera-select');

        async function getCameras() {
            try {
                // Request permissions first to get labels
                const tempStream = await navigator.mediaDevices.getUserMedia({ video: true });
                tempStream.getTracks().forEach(t => t.stop());
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                
                cameraSelect.innerHTML = '';
                videoDevices.forEach(device => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Camera ${cameraSelect.length + 1}`;
                    option.style.background = '#1a1a2e';
                    option.style.color = '#e0e0e0';
                    cameraSelect.appendChild(option);
                });
                
                if (videoDevices.length > 0) {
                    startStream(videoDevices[0].deviceId);
                } else {
                    statusMsg.innerText = "No cameras found.";
                }
            } catch (err) {
                statusMsg.innerText = 'Camera access error: ' + err.message;
            }
        }

        async function startStream(deviceId) {
            if (stream) stream.getTracks().forEach(t => t.stop());
            if (ws) { ws.close(); ws = null; }
            
            try {
                const constraints = {
                    video: deviceId ? { deviceId: { exact: deviceId }, width: { ideal: 1280 }, height: { ideal: 720 } } : { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' }
                };
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    const scale = 640 / video.videoWidth;
                    overlay.width = 640;
                    overlay.height = video.videoHeight * scale;
                    sendCanvas.width = 640;
                    sendCanvas.height = video.videoHeight * scale;

                    previewHint.innerText = 'Connecting...';
                    connectWebSocket();
                };
            } catch (err) {
                previewHint.innerText = 'Camera stream error: ' + err.message;
            }
        }

        function switchCamera() {
            const selectedId = cameraSelect.value;
            previewHint.innerText = "Switching camera...";
            startStream(selectedId);
        }

        function connectWebSocket() {
            const wsUrl = `ws://${window.location.host}/ws/register/${encodeURIComponent(studentId)}/${encodeURIComponent(studentName)}`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                previewHint.innerText = 'Detecting face...';
                sendNextFrame();
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);

                // Clear overlay
                overCtx.clearRect(0, 0, overlay.width, overlay.height);

                if (data.status === 'preview') {
                    // Phase 1: Show the detected face and the confirm button
                    previewHint.innerText = 'Face detected! Is this the correct person?';
                    confirmBar.classList.add('visible');

                    if (data.faces) {
                        drawFaces(data.faces, '#f59e0b'); // amber for preview
                    }
                } else if (data.status === 'confirmed') {
                    // Transition to capture phase
                    phase = 'capture';
                    confirmBar.classList.remove('visible');
                    infoBar.style.display = 'flex';
                    subtitleText.innerText = 'Slowly turn your head left and right to capture multiple angles.';
                    previewHint.innerText = '';
                    statusMsg.innerText = 'Recording face... Slowly turn your head.';
                    sendNextFrame();
                    return; // don't send another frame from the preview logic
                } else if (data.status === 'progress') {
                    countDisplay.innerText = `${data.count} / 20`;
                    if (data.faces) {
                        drawFaces(data.faces, '#22c55e'); // green for capture
                    }
                } else if (data.status === 'no_face') {
                    if (phase === 'preview') {
                        previewHint.innerText = 'Looking for a face... Please position yourself in front of the camera.';
                        confirmBar.classList.remove('visible');
                    }
                } else if (data.status === 'completed') {
                    countDisplay.innerText = '20 / 20';
                    statusMsg.innerText = 'Registration complete! Redirecting...';
                    setTimeout(() => { window.location.href = '/'; }, 2000);
                    return;
                } else if (data.status === 'error') {
                    statusMsg.innerText = 'Error: ' + data.message;
                    return;
                }
                
                // Send the next frame (for both preview and capture phases)
                if (data.status !== 'completed' && data.status !== 'error' && data.status !== 'confirmed') {
                    requestAnimationFrame(() => sendNextFrame());
                }
            };

            ws.onclose = () => {
                previewHint.innerText = 'Connection closed.';
            };
        }

        function drawFaces(faces, color) {
            faces.forEach(f => {
                overCtx.strokeStyle = color;
                overCtx.lineWidth = 2.5;
                overCtx.strokeRect(f.x, f.y, f.w, f.h);

                // Corner accents
                const cornerLen = 15;
                overCtx.strokeStyle = '#3b82f6';
                overCtx.lineWidth = 3;
                // Top-left
                overCtx.beginPath(); overCtx.moveTo(f.x, f.y + cornerLen); overCtx.lineTo(f.x, f.y); overCtx.lineTo(f.x + cornerLen, f.y); overCtx.stroke();
                // Top-right
                overCtx.beginPath(); overCtx.moveTo(f.x + f.w - cornerLen, f.y); overCtx.lineTo(f.x + f.w, f.y); overCtx.lineTo(f.x + f.w, f.y + cornerLen); overCtx.stroke();
                // Bottom-left
                overCtx.beginPath(); overCtx.moveTo(f.x, f.y + f.h - cornerLen); overCtx.lineTo(f.x, f.y + f.h); overCtx.lineTo(f.x + cornerLen, f.y + f.h); overCtx.stroke();
                // Bottom-right
                overCtx.beginPath(); overCtx.moveTo(f.x + f.w - cornerLen, f.y + f.h); overCtx.lineTo(f.x + f.w, f.y + f.h); overCtx.lineTo(f.x + f.w, f.y + f.h - cornerLen); overCtx.stroke();
            });
        }

        function confirmFace() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send('CONFIRM');
            }
        }

        function sendNextFrame() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            sendCtx.drawImage(video, 0, 0, sendCanvas.width, sendCanvas.height);
            const imageData = sendCanvas.toDataURL('image/jpeg', 0.8);
            ws.send(imageData);
        }

        getCameras();
    </script>
</body>
</html>
