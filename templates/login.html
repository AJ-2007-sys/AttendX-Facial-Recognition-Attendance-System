<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX - Admin Login</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #06060a;
            overflow: hidden;
            position: relative;
        }

        /* Animated gradient orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 8s ease-in-out infinite;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            top: -10%; left: -5%;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 350px; height: 350px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            bottom: -10%; right: -5%;
            animation-delay: -3s;
        }
        .orb-3 {
            width: 200px; height: 200px;
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            top: 50%; left: 60%;
            animation-delay: -5s;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: rgba(15, 15, 20, 0.75);
            backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 48px 40px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03) inset,
                0 25px 50px -12px rgba(0,0,0,0.6),
                0 0 80px rgba(59, 130, 246, 0.08);
            animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Logo */
        .logo-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.35);
            position: relative;
        }
        .logo-icon::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(59,130,246,0.3), rgba(139,92,246,0.3));
            z-index: -1;
            filter: blur(8px);
        }

        .title {
            text-align: center;
            margin-bottom: 8px;
        }
        .title h1 {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #f1f5f9, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }
        .title p {
            font-size: 14px;
            color: rgba(148, 163, 184, 0.7);
            margin-top: 8px;
        }

        /* Input */
        .input-group {
            margin-top: 32px;
            position: relative;
        }
        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: rgba(148, 163, 184, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrapper svg {
            position: absolute;
            left: 16px;
            color: rgba(148, 163, 184, 0.4);
            pointer-events: none;
            transition: color 0.2s;
        }
        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            outline: none;
            transition: all 0.25s ease;
        }
        .input-wrapper input:focus {
            border-color: rgba(59, 130, 246, 0.5);
            background: rgba(59, 130, 246, 0.05);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .input-wrapper input:focus + svg,
        .input-wrapper input:focus ~ svg {
            color: #3b82f6;
        }
        .input-wrapper input::placeholder {
            color: rgba(148, 163, 184, 0.3);
        }

        /* Button */
        .login-btn {
            width: 100%;
            margin-top: 24px;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(59, 130, 246, 0.3);
        }
        .login-btn:active {
            transform: translateY(0);
        }
        .login-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            pointer-events: none;
        }

        /* Error */
        .error-msg {
            text-align: center;
            color: #ef4444;
            font-size: 13px;
            font-weight: 500;
            margin-top: 16px;
            padding: 10px;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.15);
            border-radius: 10px;
            display: none;
            animation: shake 0.4s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        /* Footer */
        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: rgba(148, 163, 184, 0.3);
        }
    </style>
</head>
<body>
    <!-- Background orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-wrap">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </div>
            </div>

            <div class="title">
                <h1>Welcome Back</h1>
                <p>Enter your admin password to continue</p>
            </div>

            <form id="login-form">
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="Enter password" required autofocus>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="left: 16px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </div>
                </div>
                <button type="submit" class="login-btn">Sign In</button>
                <div id="error" class="error-msg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: -2px; margin-right: 4px;"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                    Incorrect password. Please try again.
                </div>
            </form>

            <p class="footer-text">AttendX &bull; Secured Access</p>
        </div>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const err = document.getElementById('error');
        const btn = form.querySelector('.login-btn');

        form.onsubmit = async (e) => {
            e.preventDefault();
            btn.textContent = 'Signing in...';
            btn.style.opacity = '0.7';
            err.style.display = 'none';

            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ 'password': password })
                });

                if (response.ok) {
                    window.location.href = '/';
                } else {
                    err.style.display = 'block';
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                    btn.textContent = 'Sign In';
                    btn.style.opacity = '1';
                }
            } catch (error) {
                err.textContent = 'Connection error. Please try again.';
                err.style.display = 'block';
                btn.textContent = 'Sign In';
                btn.style.opacity = '1';
            }
        };
    </script>
</body>
</html>
