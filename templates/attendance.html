<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX - Live Attendance</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 32px;
            overflow: auto;
        }
        .camera-page {
            width: 100%;
            max-width: 800px;
            animation: fadeSlideIn 0.4s ease;
        }
        .camera-page .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            margin-bottom: 20px;
            transition: color 0.2s;
        }
        .camera-page .back-btn:hover { color: var(--text-primary); }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .top-bar h1 {
            font-size: 24px;
            font-weight: 700;
        }
        .video-box {
            position: relative;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-glass);
            box-shadow: 0 16px 48px rgba(0,0,0,.4);
            background: #000;
            margin-bottom: 20px;
        }
        .video-box video { width: 100%; display: block; }
        .video-box canvas.overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        .status-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--accent-green);
            min-height: 20px;
            margin-bottom: 20px;
        }
        .attendance-feed {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .attendance-feed-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 10px;
            animation: fadeSlideIn 0.3s ease;
        }
        .attendance-feed-item .check-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(34, 197, 94, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .attendance-feed-item .check-icon svg {
            color: var(--accent-green);
        }
        .attendance-feed-item .details strong {
            color: var(--text-primary);
            font-size: 14px;
        }
        .attendance-feed-item .details span {
            color: var(--text-muted);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="camera-page">
        <a href="/" class="back-btn" id="back-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
            Back to Dashboard
        </a>

        <div class="top-bar">
            <h1>Live Attendance</h1>
            <div style="display: flex; gap: 15px; align-items: center;">
                <div style="display: flex; flex-direction: column; align-items: flex-end; justify-content: center;">
                    <label for="strictness-slider" style="font-size: 11px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em;">AI Threshold: <span id="strictness-val" style="color: white; font-weight: bold;">0.40</span></label>
                    <input type="range" id="strictness-slider" min="0.20" max="0.60" step="0.01" value="0.40" style="width: 120px; cursor: pointer;" oninput="document.getElementById('strictness-val').innerText = this.value">
                </div>
                <select id="camera-select" class="form-control" style="padding: 8px 12px; font-size: 13px; max-width: 250px; background: #1a1a2e; color: #e0e0e0; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; cursor: pointer; appearance: auto;" onchange="switchCamera()">
                    <option value="" style="background: #1a1a2e; color: #e0e0e0;">Loading cameras...</option>
                </select>
                <button class="btn info" style="margin-right: 5px;" onclick="testAudio()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                </button>
                <button class="btn danger" id="btn-stop" onclick="stopAndGoBack()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><rect x="9" y="9" width="6" height="6"/></svg>
                    Stop Camera
                </button>
            </div>
        </div>

        <div class="video-box">
            <video id="webcam" autoplay playsinline></video>
            <canvas class="overlay" id="overlay"></canvas>
        </div>

        <div class="status-text" id="status-msg">Initializing camera...</div>

        <h3 style="font-size: 15px; margin-bottom: 12px; color: var(--text-secondary);">Live Feed</h3>
        <div class="attendance-feed" id="feed"></div>
    </div>

    <canvas id="send-canvas" style="display:none;"></canvas>
    
    <!-- Success Chime Audio Element -->
    <audio id="success-chime" preload="auto">
        <source src="/static/success.mp3" type="audio/mp3">
    </audio>

    <script>
        const video = document.getElementById('webcam');
        const overlay = document.getElementById('overlay');
        const overCtx = overlay.getContext('2d');
        const sendCanvas = document.getElementById('send-canvas');
        const sendCtx = sendCanvas.getContext('2d');
        const statusMsg = document.getElementById('status-msg');
        const feed = document.getElementById('feed');

        let ws = null;
        let stream = null;
        const markedNames = new Set();

        const cameraSelect = document.getElementById('camera-select');

        async function getCameras() {
            try {
                // Request permissions first to get labels
                const tempStream = await navigator.mediaDevices.getUserMedia({ video: true });
                tempStream.getTracks().forEach(t => t.stop());
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                
                cameraSelect.innerHTML = '';
                videoDevices.forEach(device => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Camera ${cameraSelect.length + 1}`;
                    option.style.background = '#1a1a2e';
                    option.style.color = '#e0e0e0';
                    cameraSelect.appendChild(option);
                });
                
                if (videoDevices.length > 0) {
                    startStream(videoDevices[0].deviceId);
                } else {
                    statusMsg.innerText = "No cameras found.";
                }
            } catch (err) {
                statusMsg.innerText = 'Camera access error: ' + err.message;
            }
        }

        async function startStream(deviceId) {
            if (stream) stream.getTracks().forEach(t => t.stop());
            if (ws) { ws.close(); ws = null; }
            
            try {
                const constraints = {
                    video: deviceId ? { deviceId: { exact: deviceId }, width: { ideal: 1280 }, height: { ideal: 720 } } : { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' }
                };
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    const scale = 640 / video.videoWidth;
                    overlay.width = 640;
                    overlay.height = video.videoHeight * scale;
                    sendCanvas.width = 640;
                    sendCanvas.height = video.videoHeight * scale;

                    statusMsg.innerText = 'Connecting...';
                    connectWebSocket();
                };
            } catch (err) {
                statusMsg.innerText = 'Camera stream error: ' + err.message;
            }
        }

        function switchCamera() {
            const selectedId = cameraSelect.value;
            statusMsg.innerText = "Switching camera...";
            startStream(selectedId);
        }

        function connectWebSocket() {
            const wsUrl = `ws://${window.location.host}/ws/recognize`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                statusMsg.innerText = 'Camera active — scanning for faces...';
                sendNextFrame();
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);

                if (data.error) {
                    statusMsg.innerText = data.error;
                    return;
                }

                overCtx.clearRect(0, 0, overlay.width, overlay.height);

                if (data.faces && data.faces.length > 0) {
                    data.faces.forEach(face => {
                        const { x, y, w, h, name, distance, blink } = face;
                        const isKnown = name !== 'Unknown';

                        // Bounding box - color based on blink status
                        let boxColor = '#ef4444'; // red for unknown
                        if (isKnown && blink === 'verified') boxColor = '#22c55e'; // green
                        else if (isKnown && blink === 'waiting') boxColor = '#f59e0b'; // amber/waiting
                        else if (isKnown) boxColor = '#3b82f6'; // blue

                        overCtx.strokeStyle = boxColor;
                        overCtx.lineWidth = 2.5;
                        overCtx.strokeRect(x, y, w, h);

                        // Corner accents
                        const cornerLen = 15;
                        overCtx.strokeStyle = boxColor;
                        overCtx.lineWidth = 3;
                        overCtx.beginPath(); overCtx.moveTo(x, y + cornerLen); overCtx.lineTo(x, y); overCtx.lineTo(x + cornerLen, y); overCtx.stroke();
                        overCtx.beginPath(); overCtx.moveTo(x + w - cornerLen, y); overCtx.lineTo(x + w, y); overCtx.lineTo(x + w, y + cornerLen); overCtx.stroke();
                        overCtx.beginPath(); overCtx.moveTo(x, y + h - cornerLen); overCtx.lineTo(x, y + h); overCtx.lineTo(x + cornerLen, y + h); overCtx.stroke();
                        overCtx.beginPath(); overCtx.moveTo(x + w - cornerLen, y + h); overCtx.lineTo(x + w, y + h); overCtx.lineTo(x + w, y + h - cornerLen); overCtx.stroke();

                        // Name label with liveness status
                        let labelBg = 'rgba(239,68,68,0.85)';
                        let labelText = `${name} (${distance.toFixed(2)})`;
                        if (isKnown && blink === 'verified') {
                            labelBg = 'rgba(34,197,94,0.85)';
                            labelText = `✓ ${name} (${distance.toFixed(2)})`;
                        } else if (isKnown && blink === 'waiting') {
                            labelBg = 'rgba(245,158,11,0.85)';
                            labelText = `👁 Move slightly to verify — ${name}`;
                        } else if (isKnown) {
                            labelBg = 'rgba(59,130,246,0.85)';
                        }

                        overCtx.fillStyle = labelBg;
                        const labelH = 28;
                        overCtx.fillRect(x, y - labelH, w, labelH);
                        overCtx.fillStyle = '#fff';
                        overCtx.font = '600 13px Inter';
                        overCtx.fillText(labelText, x + 6, y - 8);

                        // Add to feed if newly marked
                        if (isKnown && data.marked && !markedNames.has(name)) {
                            console.log(`[UI] Recognition Success: ${name}. Triggering chime.`);
                            markedNames.add(name);
                            addToFeed(name);
                        } else if (isKnown && data.marked) {
                            console.log(`[UI] ${name} recognized but already in markedNames set.`);
                        }
                    });
                }
                
                // Only send the next frame AFTER processing is 100% complete
                // This eliminates the WebSocket queue delay and keeps tracking perfectly synced
                requestAnimationFrame(() => sendNextFrame());
            };

            ws.onclose = () => {
                statusMsg.innerText = 'Connection closed.';
            };
        }

        function testAudio() {
            const chime = document.getElementById('success-chime');
            console.log("[Audio] Testing chime manually...");
            chime.currentTime = 0;
            chime.play().then(() => console.log("[Audio] Test play success.")).catch(e => alert("Audio failed: " + e.message));
        }

        function addToFeed(name) {
            // Play success chime
            const chime = document.getElementById('success-chime');
            chime.currentTime = 0;
            chime.play().catch(e => console.log("Audio play blocked by browser:", e));

            const now = new Date();
            const time = now.toLocaleTimeString();
            const item = document.createElement('div');
            item.className = 'attendance-feed-item';
            item.innerHTML = `
                <div class="check-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <div class="details">
                    <strong>${name}</strong><br>
                    <span>Marked at ${time}</span>
                </div>
            `;
            feed.insertBefore(item, feed.firstChild);
        }

        function sendNextFrame() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            
            sendCtx.drawImage(video, 0, 0, sendCanvas.width, sendCanvas.height);
            const imageData = sendCanvas.toDataURL('image/jpeg', 0.6);
            
            const slider = document.getElementById('strictness-slider');
            const threshold = slider ? parseFloat(slider.value) : 0.40;
            
            ws.send(JSON.stringify({
                image: imageData,
                threshold: threshold
            }));
        }

        function stopAndGoBack() {
            if (ws) ws.close();
            if (stream) stream.getTracks().forEach(t => t.stop());
            window.location.href = '/';
        }

        // Also stop camera when navigating away
        document.getElementById('back-link').addEventListener('click', (e) => {
            e.preventDefault();
            stopAndGoBack();
        });

        getCameras();
    </script>
</body>
</html>
